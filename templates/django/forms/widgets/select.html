<select name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>
{% for group_name, group_choices, group_index in widget.optgroups %}
  {% if group_name %}
    <optgroup label="{{ group_name }}">
  {% endif %}
  {% for option in group_choices %}
    <option value="{{ option.value|stringformat:'s' }}"{% if option.selected %} selected{% endif %}{% if option.attrs %} {% for name, value in option.attrs.items %}{{ name }}{% if value != True %}="{{ value|stringformat:'s' }}"{% endif %}{% endfor %}{% endif %}>{{ option.label }}</option>
  {% endfor %}
  {% if group_name %}
    </optgroup>
  {% endif %}
{% endfor %}
</select>
