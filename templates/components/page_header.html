<div class="row mb-4">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="mb-1">
                    {% if icon %}<i class="{{ icon }} me-2"></i>{% endif %}{{ title }}
                </h1>
                {% if subtitle %}
                    <p class="lead text-muted mb-0">{{ subtitle }}</p>
                {% endif %}
            </div>
            {% if action_url and action_text %}
                <div>
                    <a href="{{ action_url }}" class="btn btn-{{ action_variant|default:'primary' }}">
                        {% if action_icon %}<i class="{{ action_icon }} me-2"></i>{% endif %}{{ action_text }}
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</div>
