<div class="d-flex justify-content-center align-items-center py-5" id="{{ spinner_id|default:'loadingSpinner' }}">
    <div class="spinner-border text-{{ variant|default:'primary' }}" role="status">
        <span class="visually-hidden">{{ text|default:'Loading...' }}</span>
    </div>
    {% if show_text %}
        <span class="ms-3 text-muted">{{ text|default:'Loading...' }}</span>
    {% endif %}
</div>
