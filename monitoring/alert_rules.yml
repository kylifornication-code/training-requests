# Prometheus alerting rules for Training Request Management System
groups:
  - name: training_system_alerts
    rules:
      # Application is down
      - alert: TrainingSystemDown
        expr: up{job="training_system"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Training System is down"
          description: "Training System has been down for more than 1 minute."

      # High response time
      - alert: HighResponseTime
        expr: django_http_requests_latency_seconds_by_view_method{quantile="0.95"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds."

      # High error rate
      - alert: HighErrorRate
        expr: rate(django_http_responses_total_by_status{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second."

      # Database connection issues
      - alert: DatabaseConnectionIssues
        expr: django_db_errors_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection issues"
          description: "Database errors detected: {{ $value }} errors."

      # High memory usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90%: {{ $value }}%."

      # High disk usage
      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes{fstype!="tmpfs"} - node_filesystem_free_bytes{fstype!="tmpfs"}) / node_filesystem_size_bytes{fstype!="tmpfs"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage"
          description: "Disk usage is above 85% on {{ $labels.device }}: {{ $value }}%."

      # SSL certificate expiring
      - alert: SSLCertificateExpiring
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}."